name: Validate Extension

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate manifest JSON
        run: |
          node -e "const fs=require('fs'); JSON.parse(fs.readFileSync('extension/manifest.json','utf8')); console.log('manifest ok');"

      - name: Syntax check background script
        run: node --check extension/background.js

      - name: Syntax check content script
        run: node --check extension/content.js

      - name: Syntax check popup script
        run: node --check extension/popup.js
